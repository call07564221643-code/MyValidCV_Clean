{% extends "base.html" %}

{% block title %}Payment Pending - MyValidCV{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 fw-bold">Payment status pending</h1>
                    <p class="text-muted">
                        Reference: <strong>{{ transaction.checkout_reference }}</strong>
                        {% if sumup_status %}<br>Payment status: <strong>{{ sumup_status }}</strong>{% endif %}
                    </p>
                    <a href="{% url 'dashboard' %}" class="btn btn-primary">Back to Dashboard</a>
                    <a href="{% url 'pricing' %}" class="btn btn-outline-secondary">Pricing</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
