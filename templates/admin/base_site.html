{% extends "admin/base.html" %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}"><span class="mvcv-admin-wordmark">MyValid<span>CV</span></span> Admin</a>
</div>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    :root {
        --primary: rgba(31, 51, 116, 0.62);
        --secondary: rgba(31, 51, 116, 0.10);
        --accent: #1f3374;
        --primary-fg: #101a33;
        --body-fg: #212529;
        --body-bg: #f8f9fa;
        --link-fg: #17233f;
        --link-selected-fg: #1f3374;
        --header-color: #101a33;
        --header-branding-color: #101a33;
        --header-bg: rgba(255, 255, 255, 0.92);
        --breadcrumbs-bg: rgba(31, 51, 116, 0.10);
        --body-quiet-color: #374151;
        --body-loud-color: #0b1020;
        --breadcrumbs-fg: #0b1020;
        --breadcrumbs-link-fg: #111827;
    }

    html[data-theme="light"] {
        color-scheme: light;
        --primary: #1f3374;
        --secondary: #e8edfb;
        --accent: #17275f;
        --primary-fg: #ffffff;
        --body-fg: #111827;
        --body-bg: #f8f9fa;
        --body-quiet-color: #374151;
        --body-loud-color: #0b1020;
        --link-fg: #101a33;
        --link-hover-color: #1f3374;
        --link-selected-fg: #17275f;
        --header-color: #0b1020;
        --header-branding-color: #101a33;
        --header-bg: #ffffff;
        --breadcrumbs-bg: #e8edfb;
        --breadcrumbs-fg: #0b1020;
        --breadcrumbs-link-fg: #111827;
    }

    #header {
        background: rgba(255, 255, 255, 0.92);
        color: #101a33;
        border-bottom: 1px solid rgba(31, 51, 116, 0.12);
    }

    #user-tools,
    #user-tools a,
    #logout-form button,
    .theme-toggle {
        color: #0b1020;
        font-size: 0.96rem;
        font-weight: 750;
    }

    #nav-sidebar .module caption,
    #nav-sidebar .module th,
    #nav-sidebar .module td,
    #nav-sidebar .module a,
    .toggle-nav-sidebar,
    div.breadcrumbs,
    div.breadcrumbs a {
        color: #0b1020;
        font-size: 1rem;
        font-weight: 700;
    }

    #nav-sidebar .module caption {
        font-size: 1.05rem;
    }

    #branding #site-name a {
        color: #1f3374;
        font-size: 1.2em;
        font-weight: 560;
        letter-spacing: -0.025em;
    }

    .mvcv-admin-wordmark {
        color: #1f3374;
        font-weight: 620;
    }

    .mvcv-admin-wordmark span {
        color: #7f9df5;
    }

    .module h2,
    .module caption,
    .inline-group h2 {
        background: rgba(31, 51, 116, 0.10);
        color: #101a33;
    }

    div.breadcrumbs {
        background: rgba(31, 51, 116, 0.10);
        color: #101a33;
    }

    html[data-theme="dark"] {
        --primary: #9fb8ff;
        --secondary: #172340;
        --accent: #dbe7ff;
        --primary-fg: #f8fafc;
        --body-fg: #f8fafc;
        --body-bg: #0f172a;
        --link-fg: #dbe7ff;
        --link-selected-fg: #ffffff;
        --header-color: #f8fafc;
        --header-branding-color: #f8fafc;
        --header-bg: #111c33;
        --breadcrumbs-bg: #172340;
        --breadcrumbs-fg: #ffffff;
        --breadcrumbs-link-fg: #ffffff;
    }

    html[data-theme="dark"] #header {
        background: #111c33;
        color: #f8fafc;
        border-bottom-color: #273449;
    }

    html[data-theme="dark"] #user-tools,
    html[data-theme="dark"] #user-tools a,
    html[data-theme="dark"] #logout-form button,
    html[data-theme="dark"] .theme-toggle,
    html[data-theme="dark"] #nav-sidebar .module caption,
    html[data-theme="dark"] #nav-sidebar .module th,
    html[data-theme="dark"] #nav-sidebar .module td,
    html[data-theme="dark"] #nav-sidebar .module a,
    html[data-theme="dark"] .toggle-nav-sidebar,
    html[data-theme="dark"] div.breadcrumbs,
    html[data-theme="dark"] div.breadcrumbs a {
        color: #ffffff;
    }

    html[data-theme="dark"] #branding #site-name a,
    html[data-theme="dark"] .mvcv-admin-wordmark {
        color: #dbe7ff;
    }

    html[data-theme="dark"] .mvcv-admin-wordmark span {
        color: #9fb8ff;
    }

    html[data-theme="dark"] .module h2,
    html[data-theme="dark"] .module caption,
    html[data-theme="dark"] .inline-group h2,
    html[data-theme="dark"] div.breadcrumbs {
        background: #172340;
        color: #f8fafc;
    }

</style>
{% endblock %}
