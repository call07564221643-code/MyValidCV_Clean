{% extends "admin/base.html" %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}"><span class="mvcv-admin-wordmark">MyValid<span>CV</span></span> Admin</a>
</div>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    :root {
        --primary: rgba(31, 51, 116, 0.62);
        --secondary: rgba(31, 51, 116, 0.10);
        --accent: #1f3374;
        --primary-fg: #101a33;
        --body-fg: #212529;
        --body-bg: #f8f9fa;
        --link-fg: #17233f;
        --link-selected-fg: #1f3374;
        --header-color: #101a33;
        --header-branding-color: #101a33;
        --header-bg: rgba(255, 255, 255, 0.92);
        --breadcrumbs-bg: rgba(31, 51, 116, 0.10);
    }

    #header {
        background: rgba(255, 255, 255, 0.92);
        color: #101a33;
        border-bottom: 1px solid rgba(31, 51, 116, 0.12);
    }

    #branding #site-name a {
        color: #1f3374;
        font-weight: 560;
        letter-spacing: -0.025em;
    }

    .mvcv-admin-wordmark {
        color: #1f3374;
        font-weight: 620;
    }

    .mvcv-admin-wordmark span {
        color: #7f9df5;
    }

    .module h2,
    .module caption,
    .inline-group h2 {
        background: rgba(31, 51, 116, 0.10);
        color: #101a33;
    }

    div.breadcrumbs {
        background: rgba(31, 51, 116, 0.10);
        color: #101a33;
    }
</style>
{% endblock %}
