{% extends "admin/base.html" %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}"><span class="mvcv-admin-wordmark">MyValid<span>CV</span></span> Admin</a>
</div>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    :root {
        --primary: rgba(31, 51, 116, 0.62);
        --secondary: rgba(31, 51, 116, 0.10);
        --accent: #1f3374;
        --primary-fg: #101a33;
        --body-fg: #212529;
        --body-bg: #f8f9fa;
        --link-fg: #17233f;
        --link-selected-fg: #1f3374;
        --header-color: #101a33;
        --header-branding-color: #101a33;
        --header-bg: rgba(255, 255, 255, 0.92);
        --breadcrumbs-bg: rgba(31, 51, 116, 0.10);
    }

    #header {
        background: rgba(255, 255, 255, 0.92);
        color: #101a33;
        border-bottom: 1px solid rgba(31, 51, 116, 0.12);
    }

    #branding #site-name a {
        color: #1f3374;
        font-weight: 560;
        letter-spacing: -0.025em;
    }

    .mvcv-admin-wordmark {
        color: #1f3374;
        font-weight: 620;
    }

    .mvcv-admin-wordmark span {
        color: #7f9df5;
    }

    .module h2,
    .module caption,
    .inline-group h2 {
        background: rgba(31, 51, 116, 0.10);
        color: #101a33;
    }

    div.breadcrumbs {
        background: rgba(31, 51, 116, 0.10);
        color: #101a33;
    }

    html[data-theme="dark"] {
        --primary: #9fb8ff;
        --secondary: #172340;
        --accent: #dbe7ff;
        --primary-fg: #f8fafc;
        --body-fg: #f8fafc;
        --body-bg: #0f172a;
        --link-fg: #dbe7ff;
        --link-selected-fg: #ffffff;
        --header-color: #f8fafc;
        --header-branding-color: #f8fafc;
        --header-bg: #111c33;
        --breadcrumbs-bg: #172340;
    }

    html[data-theme="dark"] #header {
        background: #111c33;
        color: #f8fafc;
        border-bottom-color: #273449;
    }

    html[data-theme="dark"] #branding #site-name a,
    html[data-theme="dark"] .mvcv-admin-wordmark {
        color: #dbe7ff;
    }

    html[data-theme="dark"] .mvcv-admin-wordmark span {
        color: #9fb8ff;
    }

    html[data-theme="dark"] .module h2,
    html[data-theme="dark"] .module caption,
    html[data-theme="dark"] .inline-group h2,
    html[data-theme="dark"] div.breadcrumbs {
        background: #172340;
        color: #f8fafc;
    }

    html[data-theme="auto"] {
        color-scheme: light;
        --primary: rgba(31, 51, 116, 0.62);
        --secondary: rgba(31, 51, 116, 0.10);
        --accent: #1f3374;
        --primary-fg: #101a33;
        --body-fg: #212529;
        --body-bg: #f8f9fa;
        --body-quiet-color: #4b5563;
        --body-loud-color: #111827;
        --link-fg: #17233f;
        --link-hover-color: #1f3374;
        --link-selected-fg: #1f3374;
        --hairline-color: #d8dee8;
        --border-color: #cbd5e1;
        --darkened-bg: #eef2f7;
        --selected-bg: #e6ecfb;
        --selected-row: #eef3ff;
        --header-color: #101a33;
        --header-branding-color: #101a33;
        --header-bg: rgba(255, 255, 255, 0.92);
        --breadcrumbs-bg: rgba(31, 51, 116, 0.10);
        --button-fg: #ffffff;
        --button-bg: #1f3374;
        --button-hover-bg: #17275f;
        --default-button-bg: #1f3374;
        --default-button-hover-bg: #17275f;
    }

    html[data-theme="auto"] body,
    html[data-theme="auto"] #content,
    html[data-theme="auto"] #content-main,
    html[data-theme="auto"] .dashboard #content {
        background-color: #f8f9fa;
        color: #212529;
    }

    html[data-theme="auto"] .module,
    html[data-theme="auto"] .form-row,
    html[data-theme="auto"] .submit-row,
    html[data-theme="auto"] table,
    html[data-theme="auto"] thead,
    html[data-theme="auto"] tbody,
    html[data-theme="auto"] tr,
    html[data-theme="auto"] td,
    html[data-theme="auto"] th {
        color: #212529;
    }

    html[data-theme="auto"] #user-tools,
    html[data-theme="auto"] #user-tools a,
    html[data-theme="auto"] #logout-form button,
    html[data-theme="auto"] .theme-toggle {
        color: #1f3374;
    }

    html[data-theme="auto"] #header {
        background: rgba(255, 255, 255, 0.92);
        color: #101a33;
        border-bottom-color: rgba(31, 51, 116, 0.12);
    }

    html[data-theme="auto"] #branding #site-name a,
    html[data-theme="auto"] .mvcv-admin-wordmark {
        color: #1f3374;
    }

    html[data-theme="auto"] .mvcv-admin-wordmark span {
        color: #7f9df5;
    }

    html[data-theme="auto"] .module h2,
    html[data-theme="auto"] .module caption,
    html[data-theme="auto"] .inline-group h2,
    html[data-theme="auto"] div.breadcrumbs {
        background: rgba(31, 51, 116, 0.10);
        color: #101a33;
    }
</style>
{% endblock %}
