{% extends "admin/base.html" %}

{% block branding %}
<div id="site-name">
    <a href="{% url 'admin:index' %}"><span class="mvcv-admin-logo">M</span> MyValidCV Admin</a>
</div>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    :root {
        --primary: rgba(143, 188, 235, 0.58);
        --secondary: rgba(123, 200, 182, 0.55);
        --accent: #d97706;
        --primary-fg: #101a33;
        --body-fg: #212529;
        --body-bg: #f8f9fa;
        --link-fg: #17233f;
        --link-selected-fg: #245f55;
        --header-color: #101a33;
        --header-branding-color: #101a33;
        --header-bg: rgba(143, 188, 235, 0.38);
        --breadcrumbs-bg: rgba(123, 200, 182, 0.35);
    }

    #header {
        background: rgba(143, 188, 235, 0.38);
        color: #101a33;
    }

    #branding #site-name a {
        color: #101a33;
        font-weight: 650;
    }

    .mvcv-admin-logo {
        display: inline-grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        margin-right: 0.35rem;
        background:
            radial-gradient(circle at 28% 24%, rgba(255, 255, 255, 0.92), transparent 18%),
            linear-gradient(135deg, #f59e0b, #d97706);
        color: #ffffff;
        font-weight: 800;
    }

    .module h2,
    .module caption,
    .inline-group h2 {
        background: rgba(143, 188, 235, 0.38);
        color: #101a33;
    }

    div.breadcrumbs {
        background: rgba(123, 200, 182, 0.35);
        color: #101a33;
    }
</style>
{% endblock %}
