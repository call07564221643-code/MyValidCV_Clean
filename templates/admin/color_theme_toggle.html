{% load i18n %}
<button class="theme-toggle" type="button">
  <span class="visually-hidden theme-label-when-light">{% translate 'Switch to dark theme' %}</span>
  <span class="visually-hidden theme-label-when-dark">{% translate 'Switch to light theme' %}</span>
  <svg aria-hidden="true" class="theme-icon-when-dark">
    <use xlink:href="#icon-moon" />
  </svg>
  <svg aria-hidden="true" class="theme-icon-when-light">
    <use xlink:href="#icon-sun" />
  </svg>
</button>
